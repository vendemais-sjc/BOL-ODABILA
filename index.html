<!DOCTYPE html>
<html>
<head>
    <title>Bolão da Bila</title>
    <style>
        body { background: #0a2f2a; color: white; font-family: sans-serif; padding: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid #555; }
        .info { background: #000000aa; padding: 15px; border-radius: 15px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>🇧🇷 BOLÃO DA BILA - BRASIL x HAITI 🇭🇹</h1>
    <div class="info">
        <p>💰 Aposta: R$ 25,00 | 🎯 Placar exato = 5 pontos</p>
        <p>📲 Envie seu nome e placar para <strong>(12) 98846-1978</strong> (WhatsApp) e pague o PIX <strong>12988461978</strong>. O administrador adiciona no sistema.</p>
    </div>
    <div id="ranking">Carregando...</div>

    <script>
        async function carregar() {
            const r = await fetch('dados.json?t=' + Date.now());
            const dados = await r.json();
            const apostas = dados.apostas || [];
            const resultado = dados.resultado || {};
            const ordenado = apostas.sort((a,b) => (b.confirmed && b.home===resultado.home && b.away===resultado.away ? 5 : 0) - (a.confirmed && a.home===resultado.home && a.away===resultado.away ? 5 : 0));
            let html = '<table><tr><th>#</th><th>Nome</th><th>Placar</th><th>Pontos</th></tr>';
            ordenado.forEach((a, i) => {
                let pts = 0;
                if (resultado.home !== undefined && a.confirmed && a.home == resultado.home && a.away == resultado.away) pts = 5;
                html += `<tr><td>${i+1}</td><td>${a.nome} ${a.confirmed ? '✅' : '⏳'}</td><td>${a.home} x ${a.away}</td><td>${pts}</td></tr>`;
            });
            html += `点able`;
            if (resultado.home !== undefined) html += `<p>Resultado oficial: ${resultado.home} x ${resultado.away}</p>`;
            document.getElementById('ranking').innerHTML = html;
        }
        carregar();
        setInterval(carregar, 15000);
    </script>
</body>
</html>
